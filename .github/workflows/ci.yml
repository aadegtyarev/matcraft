on: [push, pull_request]
name: CI

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt, clippy
      # cargo-audit is a build-beat tool in .ai-dev/quality/tools.json but is not a
      # cargo built-in and is not a toolchain component — install its prebuilt binary
      # so the wholesale runner below can execute the audit row.
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      # Run EVERY build-beat check from the registry — tools.json is the single home
      # for "what green means"; CI no longer hardcodes a subset (issue #16).
      - run: node .ai-dev/quality/run.mjs build
